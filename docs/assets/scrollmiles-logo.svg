<svg width="960" height="300" viewBox="0 0 960 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ScrollMiles logo</title>
  <desc id="desc">Gradient footprint mark and ScrollMiles wordmark.</desc>
  <rect width="960" height="300" rx="48" fill="url(#bg)"/>
  <g transform="translate(72 52)">
    <rect width="196" height="196" rx="44" fill="url(#mark)" filter="url(#shadow)"/>
    <path d="M62 91c9-35 28-57 50-51 22 6 29 32 18 61-7 17-18 38-25 55-4 10-16 16-29 12-13-4-20-15-18-27 2-16-1-33 4-50Z" fill="white" fill-opacity=".96"/>
    <path d="M133 116c7-28 23-45 41-40 18 5 24 26 15 49-6 14-15 30-20 44-4 9-14 14-25 10-10-3-16-13-15-23 2-13 0-27 4-40Z" fill="white" fill-opacity=".96"/>
    <circle cx="79" cy="140" r="14" fill="url(#mark)"/>
    <circle cx="145" cy="159" r="12" fill="url(#mark)"/>
    <path d="M40 116c-2-31 8-62 30-84" stroke="white" stroke-width="10" stroke-linecap="round" stroke-dasharray="24 18" opacity=".55"/>
    <path d="M69 178c37 27 92 21 123-16 31-37 28-92-6-126" stroke="white" stroke-width="10" stroke-linecap="round" opacity=".35"/>
  </g>
  <text x="320" y="142" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="800" letter-spacing="-3" fill="#090E2A">Scroll</text>
  <text x="544" y="142" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="800" letter-spacing="-3" fill="url(#text)">Miles</text>
  <text x="324" y="191" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" letter-spacing="8" fill="#69708F">HOW FAR HAS YOUR THUMB TRAVELED?</text>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="300"><stop stop-color="#F6F2FF"/><stop offset=".52" stop-color="#FFFFFF"/><stop offset="1" stop-color="#EEF7FF"/></linearGradient>
    <linearGradient id="mark" x1="26" y1="178" x2="183" y2="22"><stop stop-color="#2387FF"/><stop offset=".48" stop-color="#7444F5"/><stop offset="1" stop-color="#F85BBE"/></linearGradient>
    <linearGradient id="text" x1="544" y1="96" x2="778" y2="146"><stop stop-color="#4A6BFF"/><stop offset=".55" stop-color="#9448F5"/><stop offset="1" stop-color="#F052C2"/></linearGradient>
    <filter id="shadow" x="-18" y="-10" width="232" height="232" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#6D5EF6" flood-opacity=".28"/></filter>
  </defs>
</svg>
